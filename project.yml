name: Harvest
options:
  bundleIdPrefix: io.bitrat
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

# Four configurations so the prod and dev builds coexist. Debug + Release back
# the `Harvest` scheme; Debug-Dev + Release-Dev back the `Harvest Dev` scheme.
# All base on Shared.xcconfig (compiler flags use [config=Debug*]/[config=Release*]
# wildcards so flags track debug/release regardless of env).
configs:
  Debug: debug
  Release: release
  Debug-Dev: debug
  Release-Dev: release

configFiles:
  Debug: Config/Prod.xcconfig
  Release: Config/Prod.xcconfig
  Debug-Dev: Config/Dev.xcconfig
  Release-Dev: Config/Dev.xcconfig

targets:
  Harvest:
    type: application
    platform: iOS
    sources:
      - path: Harvest
    info:
      path: Harvest/Info.plist
      properties:
        CFBundleDisplayName: $(HARVEST_DISPLAY_NAME)
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
        HarvestBaseURL: $(HARVEST_BASE_URL)
        HarvestSupportsUniversalLinks: $(HARVEST_SUPPORTS_UNIVERSAL_LINKS)
        HarvestKeychainGroup: $(AppIdentifierPrefix)$(HARVEST_BUNDLE_ID)
        # ATS exception for the dev server's self-signed / local-CA cert.
        # Scoped to harvest.bitrat.test only — .test is an RFC 6761 reserved
        # TLD for local-development use, so no public CA will ever issue a
        # cert for it and this exception cannot weaken trust for any
        # production hostname. Prod builds never hit this domain.
        NSAppTransportSecurity:
          NSExceptionDomains:
            harvest.bitrat.test:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(HARVEST_BUNDLE_ID)
        CODE_SIGN_ENTITLEMENTS: $(HARVEST_MAIN_ENTITLEMENTS)
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: ShareExtension

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      # Share networking/models with the main app by compiling a
      # subset of Harvest/Core into the extension's module. These files
      # must not import SwiftUI — keep them transport-only. See
      # docs for ShareAPIClient.swift.
      - path: Harvest/Core/Auth/Keychain.swift
      - path: Harvest/Core/Auth/SessionPersistence.swift
      - path: Harvest/Core/Models/Bookmark.swift
      - path: Harvest/Core/Models/HarvestUser.swift
      - path: Harvest/Core/Models/Pagination.swift
      - path: Harvest/Core/Models/ProcessingStatus.swift
      - path: Harvest/Core/Models/ReadingStatus.swift
      - path: Harvest/Core/API/APIError.swift
      - path: Harvest/Core/API/Endpoints.swift
      - path: Harvest/Core/API/HarvestAPI.swift
      - path: Harvest/Core/API/ISO8601.swift
      - path: Harvest/Core/Environment.swift
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: $(HARVEST_DISPLAY_NAME)
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
        HarvestBaseURL: $(HARVEST_BASE_URL)
        HarvestSupportsUniversalLinks: $(HARVEST_SUPPORTS_UNIVERSAL_LINKS)
        HarvestKeychainGroup: $(AppIdentifierPrefix)$(HARVEST_BUNDLE_ID)
        # Share Extension needs the same ATS exception so dev-build saves
        # from Safari's share sheet can reach harvest.bitrat.test. See the
        # matching comment on the Harvest target.
        NSAppTransportSecurity:
          NSExceptionDomains:
            harvest.bitrat.test:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(HARVEST_BUNDLE_ID).ShareExtension
        CODE_SIGN_ENTITLEMENTS: $(HARVEST_SHARE_ENTITLEMENTS)
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  HarvestTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HarvestTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Harvest.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Harvest
    dependencies:
      - target: Harvest

schemes:
  Harvest:
    build:
      targets:
        Harvest: all
        ShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HarvestTests
    archive:
      config: Release

  Harvest Dev:
    build:
      targets:
        Harvest: all
        ShareExtension: all
    run:
      config: Debug-Dev
    test:
      config: Debug-Dev
      targets:
        - HarvestTests
    archive:
      config: Release-Dev
