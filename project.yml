name: Harvest
options:
  bundleIdPrefix: io.bitrat
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: 37A42LB22L
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

targets:
  Harvest:
    type: application
    platform: iOS
    sources:
      - path: Harvest
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    info:
      path: Harvest/Info.plist
      properties:
        CFBundleDisplayName: Harvest
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
        API_BASE_URL: $(API_BASE_URL)
    entitlements:
      path: Harvest/Harvest.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:harvest.bitrat.io
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.bitrat.harvest
        com.apple.security.application-groups:
          - group.io.bitrat.harvest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.bitrat.harvest
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: ShareExtension

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Harvest
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
        API_BASE_URL: $(API_BASE_URL)
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.bitrat.harvest
        com.apple.security.application-groups:
          - group.io.bitrat.harvest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.bitrat.harvest.ShareExtension
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  HarvestTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HarvestTests
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Harvest.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Harvest
    dependencies:
      - target: Harvest

schemes:
  Harvest:
    build:
      targets:
        Harvest: all
        ShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HarvestTests
    archive:
      config: Release
