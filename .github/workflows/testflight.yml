name: TestFlight

# Manual-trigger only for now. Tag-based releases can be layered on once
# the first upload proves out end-to-end.
on:
  workflow_dispatch:

concurrency:
  # Never run two TestFlight uploads simultaneously — build-number
  # collisions + ASC upload lock are both nasty. Queue instead of
  # cancelling so nothing in flight is lost.
  group: testflight
  cancel-in-progress: false

jobs:
  upload:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # Fastlane's is_key_content_base64 path fails with OpenSSL 3
      # "invalid curve name" on macos-latest. Materialize the .p8 instead
      # and let the Fastfile use key_filepath (same path as local).
      - name: Materialize ASC API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/.fastlane/harvest"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$HOME/.fastlane/harvest/asc_api_key.p8"
          chmod 600 "$HOME/.fastlane/harvest/asc_api_key.p8"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta
