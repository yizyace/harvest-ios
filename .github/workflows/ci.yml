name: CI

on:
  # Public repos get free macOS minutes, so we run CI on every PR and on
  # every push to main. pull_request gates branch work before merge;
  # push-to-main catches post-merge regressions. Other branch pushes
  # skip CI — they'll get it when they open a PR.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Select Xcode
        # maxim-lobanov/setup-xcode is the community-standard action for
        # pinning Xcode on GitHub-hosted macOS runners; it abstracts over
        # the Xcode_<version>.app naming (which changes per image release)
        # and handles DEVELOPER_DIR correctly.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick a simulator destination
        id: destination
        # Pick any available iPhone simulator rather than pin a specific
        # name (iPhone 15 / 17 Pro / etc.) that may be missing on a future
        # runner image. Works with whatever Xcode setup-xcode selected.
        run: |
          DEVICE=$(xcrun simctl list devices available | \
            grep -oE "iPhone [0-9]+( Pro Max| Pro| Plus| Air| mini)?" | \
            head -1)
          if [ -z "$DEVICE" ]; then
            echo "::error::No iPhone simulator available on this runner"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -scheme Harvest \
            -destination "platform=iOS Simulator,name=${{ steps.destination.outputs.device }},OS=latest" \
            -configuration Debug \
            -resultBundlePath TestResults.xcresult \
            test

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults.xcresult
          path: TestResults.xcresult
